name: Build

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build-dotnet:
    name: Build (.NET)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
      - name: Restore
        run: dotnet restore src/FactionAPI.Services/FactionAPI.Services.csproj
      - name: Build
        run: dotnet build src/FactionAPI.Services/FactionAPI.Services.csproj --configuration Release --no-restore